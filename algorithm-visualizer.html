<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algorithm Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --border:   #1e1e2e;
    --white:    #e8e8f0;
    --muted:    #44445a;
    --accent:   #ff3c6e;
    --blue:     #3c9eff;
    --green:    #3cffa0;
    --yellow:   #ffe03c;
    --purple:   #b03cff;
    --bar-base: #1e1e3a;
    --font-mono: 'Space Mono', monospace;
    --font-head: 'Bebas Neue', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 12px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── Header ── */
  header {
    padding: 28px 40px 20px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 280px; height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .logo {
    font-family: var(--font-head);
    font-size: 42px;
    letter-spacing: 4px;
    line-height: 1;
    color: var(--white);
  }

  .logo em {
    color: var(--accent);
    font-style: normal;
  }

  .subtitle {
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .stats-row {
    display: flex;
    gap: 32px;
    text-align: right;
  }

  .stat-label { color: var(--muted); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }
  .stat-value { color: var(--accent); font-size: 22px; font-family: var(--font-head); letter-spacing: 2px; margin-top: 2px; }

  /* ── Controls ── */
  .controls {
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .algo-btns { display: flex; gap: 4px; }

  .algo-btn {
    padding: 8px 18px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .algo-btn:hover { border-color: var(--white); color: var(--white); }

  .algo-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  .divider { width: 1px; height: 32px; background: var(--border); margin: 0 4px; }

  .control-btn {
    padding: 8px 20px;
    background: none;
    border: 1px solid var(--border);
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .control-btn:hover { border-color: var(--accent); color: var(--accent); }

  .control-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  .control-btn.primary:hover { opacity: 0.85; }
  .control-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .speed-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100px;
    height: 2px;
    background: var(--border);
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .size-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Visualizer ── */
  .viz-area {
    flex: 1;
    padding: 32px 40px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  #bar-container {
    flex: 1;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    min-height: 300px;
    position: relative;
  }

  .bar {
    flex: 1;
    border-radius: 2px 2px 0 0;
    background: var(--bar-base);
    transition: height 0.05s ease;
    position: relative;
  }

  .bar.comparing  { background: var(--yellow); box-shadow: 0 0 12px rgba(255,224,60,0.5); }
  .bar.swapping   { background: var(--accent);  box-shadow: 0 0 14px rgba(255,60,110,0.6); }
  .bar.sorted     { background: var(--green);   box-shadow: 0 0 10px rgba(60,255,160,0.4); }
  .bar.pivot      { background: var(--purple);  box-shadow: 0 0 14px rgba(176,60,255,0.6); }
  .bar.merging    { background: var(--blue);    box-shadow: 0 0 12px rgba(60,158,255,0.5); }

  /* ── Info bar ── */
  .info-bar {
    display: flex;
    gap: 32px;
    padding: 16px 0 0;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .info-item { display: flex; flex-direction: column; gap: 4px; }
  .info-label { color: var(--muted); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }
  .info-value { color: var(--white); font-size: 14px; font-family: var(--font-head); letter-spacing: 1px; }
  .info-value.accent { color: var(--accent); }

  /* ── Complexity card ── */
  .complexity {
    margin-left: auto;
    display: flex;
    gap: 24px;
  }

  .cmplx-item { text-align: center; }
  .cmplx-label { color: var(--muted); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .cmplx-val { font-family: var(--font-head); font-size: 16px; letter-spacing: 1px; }
  .cmplx-val.best  { color: var(--green); }
  .cmplx-val.avg   { color: var(--yellow); }
  .cmplx-val.worst { color: var(--accent); }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 20px;
    padding: 12px 40px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .dot { width: 10px; height: 10px; border-radius: 2px; }

  /* completion flash */
  @keyframes completePulse {
    0%   { box-shadow: 0 0 0 rgba(60,255,160,0); }
    50%  { box-shadow: 0 0 40px rgba(60,255,160,0.3); }
    100% { box-shadow: 0 0 0 rgba(60,255,160,0); }
  }

  .complete-flash { animation: completePulse 0.8s ease; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">ALGO<em>.</em>VIZ</div>
    <div class="subtitle">Sorting Algorithm Visualizer</div>
  </div>
  <div class="stats-row">
    <div>
      <div class="stat-label">Comparisons</div>
      <div class="stat-value" id="cmp-count">0</div>
    </div>
    <div>
      <div class="stat-label">Swaps</div>
      <div class="stat-value" id="swap-count">0</div>
    </div>
    <div>
      <div class="stat-label">Array Accesses</div>
      <div class="stat-value" id="access-count">0</div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="algo-btns">
    <button class="algo-btn active" onclick="selectAlgo('bubble', this)">Bubble</button>
    <button class="algo-btn" onclick="selectAlgo('selection', this)">Selection</button>
    <button class="algo-btn" onclick="selectAlgo('insertion', this)">Insertion</button>
    <button class="algo-btn" onclick="selectAlgo('merge', this)">Merge</button>
    <button class="algo-btn" onclick="selectAlgo('quick', this)">Quick</button>
  </div>

  <div class="divider"></div>

  <button class="control-btn primary" id="sort-btn" onclick="startSort()">▶ Sort</button>
  <button class="control-btn" onclick="generateArray()">⟳ Shuffle</button>

  <div class="size-wrap">
    Size
    <input type="range" min="20" max="120" value="50" id="size-slider" oninput="onSizeChange(this.value)">
    <span id="size-label">50</span>
  </div>

  <div class="speed-wrap">
    Speed
    <input type="range" min="1" max="10" value="6" id="speed-slider">
    Fast
  </div>
</div>

<div class="viz-area">
  <div id="bar-container"></div>

  <div class="info-bar">
    <div class="info-item">
      <div class="info-label">Algorithm</div>
      <div class="info-value accent" id="algo-name">Bubble Sort</div>
    </div>
    <div class="info-item">
      <div class="info-label">Status</div>
      <div class="info-value" id="status">Ready</div>
    </div>
    <div class="info-item">
      <div class="info-label">Array Size</div>
      <div class="info-value" id="arr-size">50</div>
    </div>

    <div class="complexity" id="complexity-display">
      <div class="cmplx-item">
        <div class="cmplx-label">Best</div>
        <div class="cmplx-val best" id="cmplx-best">O(n)</div>
      </div>
      <div class="cmplx-item">
        <div class="cmplx-label">Average</div>
        <div class="cmplx-val avg" id="cmplx-avg">O(n²)</div>
      </div>
      <div class="cmplx-item">
        <div class="cmplx-label">Worst</div>
        <div class="cmplx-val worst" id="cmplx-worst">O(n²)</div>
      </div>
      <div class="cmplx-item">
        <div class="cmplx-label">Space</div>
        <div class="cmplx-val" id="cmplx-space">O(1)</div>
      </div>
    </div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="dot" style="background:#1e1e3a;border:1px solid #3a3a5a"></div>Unsorted</div>
  <div class="legend-item"><div class="dot" style="background:#ffe03c"></div>Comparing</div>
  <div class="legend-item"><div class="dot" style="background:#ff3c6e"></div>Swapping</div>
  <div class="legend-item"><div class="dot" style="background:#b03cff"></div>Pivot</div>
  <div class="legend-item"><div class="dot" style="background:#3c9eff"></div>Merging</div>
  <div class="legend-item"><div class="dot" style="background:#3cffa0"></div>Sorted</div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let array = [];
  let bars  = [];
  let currentAlgo = 'bubble';
  let sorting = false;
  let comparisons = 0, swaps = 0, accesses = 0;

  const COMPLEXITY = {
    bubble:    { best: 'O(n)',      avg: 'O(n²)',     worst: 'O(n²)',      space: 'O(1)',      name: 'Bubble Sort' },
    selection: { best: 'O(n²)',     avg: 'O(n²)',     worst: 'O(n²)',      space: 'O(1)',      name: 'Selection Sort' },
    insertion: { best: 'O(n)',      avg: 'O(n²)',     worst: 'O(n²)',      space: 'O(1)',      name: 'Insertion Sort' },
    merge:     { best: 'O(n log n)',avg: 'O(n log n)',worst: 'O(n log n)', space: 'O(n)',      name: 'Merge Sort' },
    quick:     { best: 'O(n log n)',avg: 'O(n log n)',worst: 'O(n²)',      space: 'O(log n)',  name: 'Quick Sort' },
  };

  // ── Init ───────────────────────────────────────────────────────────────────
  function getSize()  { return parseInt(document.getElementById('size-slider').value); }
  function getDelay() {
    const v = parseInt(document.getElementById('speed-slider').value);
    return Math.max(2, Math.round(200 / (v * v)));
  }

  function generateArray() {
    if (sorting) return;
    const n = getSize();
    array = Array.from({ length: n }, () => Math.floor(Math.random() * 90) + 10);
    renderBars();
    resetCounters();
    setStatus('Ready');
  }

  function renderBars() {
    const container = document.getElementById('bar-container');
    container.innerHTML = '';
    bars = [];
    const max = Math.max(...array);
    array.forEach(val => {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.height = `${(val / max) * 100}%`;
      container.appendChild(bar);
      bars.push(bar);
    });
    document.getElementById('arr-size').textContent = array.length;
  }

  function updateBar(i) {
    const max = Math.max(...array);
    bars[i].style.height = `${(array[i] / max) * 100}%`;
  }

  function resetCounters() {
    comparisons = swaps = accesses = 0;
    document.getElementById('cmp-count').textContent  = '0';
    document.getElementById('swap-count').textContent = '0';
    document.getElementById('access-count').textContent = '0';
  }

  function incCmp()    { document.getElementById('cmp-count').textContent    = ++comparisons; }
  function incSwap()   { document.getElementById('swap-count').textContent   = ++swaps; }
  function incAccess() { document.getElementById('access-count').textContent = ++accesses; }

  function setStatus(s) { document.getElementById('status').textContent = s; }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function clearColors() { bars.forEach(b => b.className = 'bar'); }

  function markSorted(...indices) {
    indices.forEach(i => { if (i >= 0 && i < bars.length) bars[i].className = 'bar sorted'; });
  }

  function markAllSorted() {
    bars.forEach(b => b.className = 'bar sorted');
    document.getElementById('bar-container').classList.add('complete-flash');
    setTimeout(() => document.getElementById('bar-container').classList.remove('complete-flash'), 800);
  }

  // ── Algo selection ─────────────────────────────────────────────────────────
  function selectAlgo(algo, btn) {
    if (sorting) return;
    currentAlgo = algo;
    document.querySelectorAll('.algo-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const c = COMPLEXITY[algo];
    document.getElementById('algo-name').textContent    = c.name;
    document.getElementById('cmplx-best').textContent   = c.best;
    document.getElementById('cmplx-avg').textContent    = c.avg;
    document.getElementById('cmplx-worst').textContent  = c.worst;
    document.getElementById('cmplx-space').textContent  = c.space;
    generateArray();
  }

  function onSizeChange(v) {
    document.getElementById('size-label').textContent = v;
    generateArray();
  }

  // ── Sort dispatcher ────────────────────────────────────────────────────────
  async function startSort() {
    if (sorting) return;
    sorting = true;
    resetCounters();
    document.getElementById('sort-btn').disabled = true;
    setStatus('Sorting...');

    if      (currentAlgo === 'bubble')    await bubbleSort();
    else if (currentAlgo === 'selection') await selectionSort();
    else if (currentAlgo === 'insertion') await insertionSort();
    else if (currentAlgo === 'merge')     await mergeSortWrapper();
    else if (currentAlgo === 'quick')     await quickSortWrapper();

    markAllSorted();
    setStatus('Done ✓');
    sorting = false;
    document.getElementById('sort-btn').disabled = false;
  }

  // ── Bubble Sort ────────────────────────────────────────────────────────────
  async function bubbleSort() {
    const n = array.length;
    for (let i = 0; i < n - 1; i++) {
      for (let j = 0; j < n - i - 1; j++) {
        bars[j].className = 'bar comparing';
        bars[j + 1].className = 'bar comparing';
        incCmp(); incAccess(); incAccess();
        await sleep(getDelay());

        if (array[j] > array[j + 1]) {
          bars[j].className = 'bar swapping';
          bars[j + 1].className = 'bar swapping';
          [array[j], array[j + 1]] = [array[j + 1], array[j]];
          updateBar(j); updateBar(j + 1);
          incSwap(); incAccess(); incAccess();
          await sleep(getDelay());
        }

        bars[j].className = 'bar';
        bars[j + 1].className = 'bar';
      }
      markSorted(n - 1 - i);
    }
    markSorted(0);
  }

  // ── Selection Sort ─────────────────────────────────────────────────────────
  async function selectionSort() {
    const n = array.length;
    for (let i = 0; i < n - 1; i++) {
      let minIdx = i;
      bars[i].className = 'bar pivot';

      for (let j = i + 1; j < n; j++) {
        bars[j].className = 'bar comparing';
        incCmp(); incAccess(); incAccess();
        await sleep(getDelay());

        if (array[j] < array[minIdx]) {
          if (minIdx !== i) bars[minIdx].className = 'bar';
          minIdx = j;
          bars[minIdx].className = 'bar swapping';
        } else {
          bars[j].className = 'bar';
        }
      }

      if (minIdx !== i) {
        bars[minIdx].className = 'bar swapping';
        bars[i].className = 'bar swapping';
        [array[i], array[minIdx]] = [array[minIdx], array[i]];
        updateBar(i); updateBar(minIdx);
        incSwap();
        await sleep(getDelay());
        bars[minIdx].className = 'bar';
      }
      markSorted(i);
    }
    markSorted(n - 1);
  }

  // ── Insertion Sort ─────────────────────────────────────────────────────────
  async function insertionSort() {
    const n = array.length;
    markSorted(0);
    for (let i = 1; i < n; i++) {
      let key = array[i];
      let j = i - 1;
      bars[i].className = 'bar comparing';
      incAccess();
      await sleep(getDelay());

      while (j >= 0 && array[j] > key) {
        incCmp(); incAccess();
        bars[j].className = 'bar swapping';
        array[j + 1] = array[j];
        updateBar(j + 1);
        incSwap();
        await sleep(getDelay());
        bars[j + 1].className = 'bar sorted';
        j--;
      }
      incCmp();
      array[j + 1] = key;
      updateBar(j + 1);
      markSorted(j + 1);
    }
  }

  // ── Merge Sort ─────────────────────────────────────────────────────────────
  async function mergeSortWrapper() {
    await mergeSort(0, array.length - 1);
  }

  async function mergeSort(l, r) {
    if (l >= r) return;
    const m = Math.floor((l + r) / 2);
    await mergeSort(l, m);
    await mergeSort(m + 1, r);
    await merge(l, m, r);
  }

  async function merge(l, m, r) {
    const left  = array.slice(l, m + 1);
    const right = array.slice(m + 1, r + 1);
    let i = 0, j = 0, k = l;

    while (i < left.length && j < right.length) {
      bars[k].className = 'bar merging';
      incCmp(); incAccess(); incAccess();
      await sleep(getDelay());

      if (left[i] <= right[j]) {
        array[k] = left[i++];
      } else {
        array[k] = right[j++];
        incSwap();
      }
      updateBar(k);
      await sleep(getDelay());
      bars[k].className = 'bar';
      k++;
    }

    while (i < left.length) {
      bars[k].className = 'bar merging';
      array[k] = left[i++];
      updateBar(k);
      incAccess();
      await sleep(getDelay());
      bars[k].className = 'bar';
      k++;
    }

    while (j < right.length) {
      bars[k].className = 'bar merging';
      array[k] = right[j++];
      updateBar(k);
      incAccess();
      await sleep(getDelay());
      bars[k].className = 'bar';
      k++;
    }
  }

  // ── Quick Sort ─────────────────────────────────────────────────────────────
  async function quickSortWrapper() {
    await quickSort(0, array.length - 1);
  }

  async function quickSort(low, high) {
    if (low < high) {
      const pi = await partition(low, high);
      markSorted(pi);
      await quickSort(low, pi - 1);
      await quickSort(pi + 1, high);
    } else if (low === high) {
      markSorted(low);
    }
  }

  async function partition(low, high) {
    const pivot = array[high];
    bars[high].className = 'bar pivot';
    let i = low - 1;

    for (let j = low; j < high; j++) {
      bars[j].className = 'bar comparing';
      incCmp(); incAccess(); incAccess();
      await sleep(getDelay());

      if (array[j] < pivot) {
        i++;
        bars[i].className = 'bar swapping';
        bars[j].className = 'bar swapping';
        [array[i], array[j]] = [array[j], array[i]];
        updateBar(i); updateBar(j);
        incSwap();
        await sleep(getDelay());
        bars[i].className = 'bar';
      }
      bars[j].className = 'bar';
    }

    bars[i + 1].className = 'bar swapping';
    [array[i + 1], array[high]] = [array[high], array[i + 1]];
    updateBar(i + 1); updateBar(high);
    incSwap();
    await sleep(getDelay());
    bars[high].className = 'bar';

    return i + 1;
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  generateArray();
</script>
</body>
</html>
